<!DOCTYPE html>
<html>
<head>
    <title>Qwizit</title>
    <link rel="icon" type="image/png" href="logoQwizit.png">
    <style>
        #Question {
            text-align: center;
            border:1px double black;
            padding: 20px;
        }
        #nextQuestion:hover {
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
        }
        #Question img {
            width: 50px;
            height: auto;
            margin: 10px;
        }
        #grille-questions {
            grid-template-columns: 1fr 1fr;
            height:400px;
            gap:10px;
            display:none;
        }
        #R1:hover, #R2:hover, #R3:hover, #R4:hover {
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
        }
        #R1 { background: red; border-radius: 25px; }
        #R2 { background: blue; border-radius: 25px; }
        #R3 { background: yellow; border-radius: 25px;}
        #R4 { background: green; border-radius: 25px;}
        #resultats {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 300px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 3px solid #4CAF50;
        }
        #gagne {
            font-size: 20px;
            line-height: 1.6;
            color: #333;
        }
        #gagne b {
            color: #4CAF50;
            font-size: 28px;
        }
    </style>
</head>
<body>
    <div id="QuestionsReponses">
        <div id="Question">
            <img src="logoQwizit.png" alt="Logo Qwizit">
            <h1>Welcome to Qwizit</h1>
            <img src="logoQwizit.png" alt="Logo Qwizit">
            <br>
            <p>Press space to start.</p>
        </div>
        <br>
        <div id="grille-questions">
            <div id="timer-container" style="grid-column: span 2; text-align: center;">
                <span id="timer">15</span>s
            </div>
            <button id="R1" onclick="MettreRC1()"></button>
            <button id="R2" onclick="MettreRC2()"></button>
            <button id="R3" onclick="MettreRC3()"></button>
            <button id="R4" onclick="MettreRC4()"></button>
        </div>
    </div>
    <div id="resultats">
        <p id="gagne"></p>
        <button id="nextQuestion" onclick="resultsToQuestions()">Go To Next Question</button>
    </div>

    <script>
        var questions = [
            {"Q":"Question 1","reponse":["R1", "R2", "R3", "R4","R1"],"temps":"15"},
            {"Q":"Question 2","reponse":["R1", "R2", "R3", "R4","R1"],"temps":"15"},
            {"Q":"Question 3","reponse":["R1", "R2", "R3", "R4","R1"],"temps":"15"},
            {"Q":"Question 4","reponse":["R1", "R2", "R3", "R4","R1"],"temps":"15"}
        ];

        let RChoisie = "";
        let tempsRestant = 0;
        let BonneReponse = "";
        let Score = 0;
        let NQuestion = 0; 
        let gameStarted = false;
        let timerInterval;

        const gagne = document.getElementById("gagne");
        const QuestionsReponses = document.getElementById("QuestionsReponses");
        const resultatsDiv = document.getElementById("resultats");

        function timer() {
            tempsRestant--;
            document.getElementById("timer").textContent = tempsRestant;
            if (tempsRestant <= 0) {
                clearInterval(timerInterval);
                resultatQuestion("Temps écoulé !");
            }
        }

        function resultatQuestion(TEXT) {
            clearInterval(timerInterval);
            resultatsDiv.style.display = "block";
            QuestionsReponses.style.display = "none";
            
            // On vérifie si c'était la dernière question de la liste
            if (NQuestion === questions.length - 1) {
                lastQuestion(TEXT);
            } else {
                gagne.textContent = TEXT;
                document.getElementById("nextQuestion").style.display = "inline-block";
            }
        }

        function MettreRC1() { RChoisie = "R1"; VerifyReponse(); }
        function MettreRC2() { RChoisie = "R2"; VerifyReponse(); }
        function MettreRC3() { RChoisie = "R3"; VerifyReponse(); }
        function MettreRC4() { RChoisie = "R4"; VerifyReponse(); }

        function VerifyReponse() {
            if (RChoisie === BonneReponse) {
                Score++;
                resultatQuestion("Bravo! C'est la bonne reponse!");
            } else {
                resultatQuestion("Non. C'est la mauvaise reponse.");
            }
        }

        function lastQuestion(lastFeedback) {
            let nombreDeQuestions = questions.length;
            let pourcentageTotal = (Score / nombreDeQuestions) * 100;
            let message = pourcentageTotal >= 80 ? "Excellent ! 🍁" : "Bien joué !";
            
            gagne.innerHTML = `
                <p>${lastFeedback}</p>
                <hr>
                <div style="font-size: 50px;">🏆</div>
                <h2>${message}</h2>
                <p>Ton score est de :<br>
                <b>${Score} / ${nombreDeQuestions}</b></p>
                <div style="color: #888;">(${pourcentageTotal}%)</div>
            `;
            document.getElementById("nextQuestion").style.display = "none";
        }

        function NextQuestion() {
            clearInterval(timerInterval);
            let currentQ = questions[NQuestion];
            
            tempsRestant = parseInt(currentQ.temps);
            document.getElementById("timer").textContent = tempsRestant;
            timerInterval = setInterval(timer, 1000);

            BonneReponse = currentQ.reponse[4];

            document.getElementById("grille-questions").style.display = "grid";
            document.getElementById("Question").innerHTML = `<h1>${currentQ.Q}</h1>`;
            document.getElementById("R1").textContent = currentQ.reponse[0];
            document.getElementById("R2").textContent = currentQ.reponse[1];
            document.getElementById("R3").textContent = currentQ.reponse[2];
            document.getElementById("R4").textContent = currentQ.reponse[3];
        }

        function resultsToQuestions() {
            NQuestion++; // On passe à la suivante SEULEMENT ici
            resultatsDiv.style.display = "none";
            QuestionsReponses.style.display = "block";
            NextQuestion();
        }

        document.addEventListener("keydown", function(e) {
            if ((e.key === " " || e.key === "Spacebar") && !gameStarted) {
                gameStarted = true;
                NextQuestion();
            }
        });
    </script>
</body>
</html>
